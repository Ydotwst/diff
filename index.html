<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TextDiff｜テキスト差分チェッカー</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3250;
    --text: #e2e8f0;
    --muted: #8892a4;
    --accent: #6c8aff;
    --add-bg: #0d2b1a;
    --add-hl: #1a5c32;
    --add-word: #22c55e;
    --del-bg: #2b0d0d;
    --del-hl: #5c1a1a;
    --del-word: #ef4444;
    --mod-bg: #2b2200;
    --mod-hl: #5c4a00;
    --mod-word: #f59e0b;
    --radius: 8px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 20px 32px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  header h1 {
    font-size: 1.25rem;
    font-weight: 600;
    letter-spacing: -0.02em;
    flex: 1;
    min-width: 180px;
  }

  header h1 span {
    color: var(--accent);
  }

  .controls {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }

  .btn {
    padding: 7px 14px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn:hover { background: var(--border); }
  .btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 500;
  }
  .btn.primary:hover { opacity: 0.88; }
  .btn.active {
    border-color: var(--accent);
    color: var(--accent);
  }

  .tab-group {
    display: flex;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .tab-group .btn {
    border: none;
    border-radius: 0;
    border-right: 1px solid var(--border);
  }
  .tab-group .btn:last-child { border-right: none; }

  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 20px 32px;
    gap: 16px;
    overflow: hidden;
  }

  /* Input area */
  .input-area {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .pane-label {
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    margin-bottom: 6px;
  }

  textarea {
    width: 100%;
    height: 160px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 0.85rem;
    line-height: 1.6;
    padding: 12px 14px;
    resize: vertical;
    outline: none;
    transition: border-color 0.15s;
  }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--muted); }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 16px;
    align-items: center;
    padding: 8px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 0.8rem;
    flex-wrap: wrap;
  }
  .stat { display: flex; align-items: center; gap: 5px; }
  .stat-dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .stat-dot.add { background: var(--add-word); }
  .stat-dot.del { background: var(--del-word); }
  .stat-dot.mod { background: var(--mod-word); }
  .stat-dot.eq  { background: var(--muted); }
  .stat-count { font-weight: 600; }
  .stats-bar .sep { color: var(--border); }

  /* Output area */
  .output-area {
    flex: 1;
    overflow: auto;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    min-height: 200px;
  }

  .placeholder {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    min-height: 200px;
    color: var(--muted);
    font-size: 0.9rem;
    flex-direction: column;
    gap: 8px;
  }
  .placeholder svg { opacity: 0.3; }

  /* Side-by-side view */
  .diff-side-by-side {
    display: grid;
    grid-template-columns: 1fr 1fr;
  }
  .diff-col {
    overflow: auto;
  }
  .diff-col:first-child {
    border-right: 1px solid var(--border);
  }
  .diff-col-header {
    padding: 8px 14px;
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--surface);
    z-index: 1;
  }

  /* Unified view */
  .diff-unified {
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    font-size: 0.82rem;
    line-height: 1.6;
  }

  /* Diff line */
  .diff-line {
    display: flex;
    align-items: baseline;
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    font-size: 0.82rem;
    line-height: 1.6;
    min-height: 1.6em;
  }
  .diff-line:hover { filter: brightness(1.15); }

  .line-no {
    user-select: none;
    width: 44px;
    min-width: 44px;
    padding: 0 8px;
    text-align: right;
    color: var(--muted);
    font-size: 0.72rem;
    opacity: 0.6;
    flex-shrink: 0;
  }

  .line-sign {
    user-select: none;
    width: 20px;
    min-width: 20px;
    text-align: center;
    font-weight: 700;
    flex-shrink: 0;
    font-size: 0.85rem;
  }

  .line-content {
    flex: 1;
    padding: 0 10px 0 2px;
    word-break: break-all;
    white-space: pre-wrap;
  }

  /* Line type colors */
  .diff-line.add    { background: var(--add-bg); }
  .diff-line.add .line-sign { color: var(--add-word); }
  .diff-line.del    { background: var(--del-bg); }
  .diff-line.del .line-sign { color: var(--del-word); }
  .diff-line.mod    { background: var(--mod-bg); }
  .diff-line.mod .line-sign { color: var(--mod-word); }
  .diff-line.eq     { background: transparent; }
  .diff-line.eq .line-sign { color: var(--muted); opacity: 0.4; }

  /* Word-level highlights */
  mark.add {
    background: var(--add-hl);
    color: var(--add-word);
    border-radius: 3px;
    padding: 0 1px;
  }
  mark.del {
    background: var(--del-hl);
    color: var(--del-word);
    border-radius: 3px;
    padding: 0 1px;
    text-decoration: line-through;
    text-decoration-color: var(--del-word);
  }
  mark.mod {
    background: var(--mod-hl);
    color: var(--mod-word);
    border-radius: 3px;
    padding: 0 1px;
  }

  /* Collapsed unchanged block */
  .diff-hunk-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 14px;
    font-size: 0.75rem;
    color: var(--muted);
    background: var(--surface2);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
  }
  .diff-hunk-header:hover { color: var(--text); }

  footer {
    padding: 10px 32px;
    font-size: 0.75rem;
    color: var(--muted);
    border-top: 1px solid var(--border);
    display: flex;
    gap: 16px;
    align-items: center;
    flex-wrap: wrap;
  }
  .legend { display: flex; gap: 12px; }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-swatch {
    width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0;
  }
  .legend-swatch.add { background: var(--add-hl); border: 1px solid var(--add-word); }
  .legend-swatch.del { background: var(--del-hl); border: 1px solid var(--del-word); }
  .legend-swatch.mod { background: var(--mod-hl); border: 1px solid var(--mod-word); }

  @media (max-width: 700px) {
    main { padding: 12px 14px; }
    header { padding: 14px; }
    .input-area { grid-template-columns: 1fr; }
    .diff-side-by-side { grid-template-columns: 1fr; }
    .diff-col:first-child { border-right: none; border-bottom: 1px solid var(--border); }
  }
</style>
</head>
<body>

<header>
  <h1>Text<span>Diff</span></h1>
  <div class="controls">
    <div class="tab-group" id="granularity-tabs">
      <button class="btn active" data-g="word" title="単語レベルで差分を検出">単語</button>
      <button class="btn" data-g="char" title="文字レベルで差分を検出">文字</button>
      <button class="btn" data-g="line" title="行レベルのみ">行</button>
    </div>
    <div class="tab-group" id="view-tabs">
      <button class="btn active" data-v="side" title="左右に並べて表示">並列</button>
      <button class="btn" data-v="unified" title="統合表示">統合</button>
    </div>
    <button class="btn" id="btn-swap" title="左右を入れ替え">⇄ 入れ替え</button>
    <button class="btn" id="btn-clear" title="すべてクリア">クリア</button>
    <button class="btn primary" id="btn-diff">比較する</button>
  </div>
</header>

<main>
  <div class="input-area">
    <div>
      <div class="pane-label">変更前 (オリジナル)</div>
      <textarea id="text-a" placeholder="比較元のテキストを入力...&#10;&#10;例: Hello, World!
This is a sample text.
It has multiple lines."></textarea>
    </div>
    <div>
      <div class="pane-label">変更後 (修正版)</div>
      <textarea id="text-b" placeholder="比較先のテキストを入力...&#10;&#10;例: Hello, World!
This is a great sample text.
It has several lines.
And a new line!"></textarea>
    </div>
  </div>

  <div class="stats-bar" id="stats-bar" style="display:none">
    <div class="stat">
      <div class="stat-dot add"></div>
      <span>追加 <strong class="stat-count" id="cnt-add">0</strong> 行</span>
    </div>
    <span class="sep">|</span>
    <div class="stat">
      <div class="stat-dot del"></div>
      <span>削除 <strong class="stat-count" id="cnt-del">0</strong> 行</span>
    </div>
    <span class="sep">|</span>
    <div class="stat">
      <div class="stat-dot mod"></div>
      <span>変更 <strong class="stat-count" id="cnt-mod">0</strong> 行</span>
    </div>
    <span class="sep">|</span>
    <div class="stat">
      <div class="stat-dot eq"></div>
      <span>同一 <strong class="stat-count" id="cnt-eq">0</strong> 行</span>
    </div>
  </div>

  <div class="output-area" id="output">
    <div class="placeholder">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v18m0 0h10a2 2 0 0 0 2-2V9M9 21H5a2 2 0 0 1-2-2V9m0 0h18"/>
      </svg>
      <span>テキストを入力して「比較する」を押してください</span>
    </div>
  </div>
</main>

<footer>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch add"></div>追加</div>
    <div class="legend-item"><div class="legend-swatch del"></div>削除</div>
    <div class="legend-item"><div class="legend-swatch mod"></div>変更</div>
  </div>
  <span style="margin-left:auto">TextDiff &mdash; ブラウザのみで動作、サーバー送信なし</span>
</footer>

<script>
// ─── LCS-based line diff ───────────────────────────────────────────────────

function lcs(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({length: m + 1}, () => new Int32Array(n + 1));
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1] + 1 : Math.max(dp[i-1][j], dp[i][j-1]);
  // backtrack
  const ops = [];
  let i = m, j = n;
  while (i > 0 || j > 0) {
    if (i > 0 && j > 0 && a[i-1] === b[j-1]) { ops.push({t:'eq', a:a[i-1], b:b[j-1]}); i--; j--; }
    else if (j > 0 && (i === 0 || dp[i][j-1] >= dp[i-1][j])) { ops.push({t:'ins', b:b[j-1]}); j--; }
    else { ops.push({t:'del', a:a[i-1]}); i--; }
  }
  return ops.reverse();
}

// Pair consecutive del+ins into mod
function pairOps(ops) {
  const result = [];
  let i = 0;
  while (i < ops.length) {
    if (ops[i].t === 'del' && i+1 < ops.length && ops[i+1].t === 'ins') {
      result.push({t:'mod', a:ops[i].a, b:ops[i+1].b});
      i += 2;
    } else {
      result.push(ops[i]);
      i++;
    }
  }
  return result;
}

// ─── Word / char tokenizer ─────────────────────────────────────────────────

function tokenize(str, mode) {
  if (mode === 'char') return [...str];
  // word mode: split keeping whitespace as tokens
  return str.split(/(\s+)/).filter(s => s !== '');
}

// Inline diff between two strings, returns HTML
function inlineDiff(oldStr, newStr, mode) {
  if (mode === 'line') {
    return { oldHtml: esc(oldStr), newHtml: esc(newStr) };
  }
  const tokA = tokenize(oldStr, mode);
  const tokB = tokenize(newStr, mode);
  const ops = pairOps(lcs(tokA, tokB));

  let oldHtml = '', newHtml = '';
  for (const op of ops) {
    if (op.t === 'eq') {
      const s = esc(op.a);
      oldHtml += s; newHtml += s;
    } else if (op.t === 'del') {
      oldHtml += `<mark class="del">${esc(op.a)}</mark>`;
    } else if (op.t === 'ins') {
      newHtml += `<mark class="add">${esc(op.b)}</mark>`;
    } else { // mod
      oldHtml += `<mark class="mod">${esc(op.a)}</mark>`;
      newHtml += `<mark class="mod">${esc(op.b)}</mark>`;
    }
  }
  return { oldHtml, newHtml };
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// ─── Main diff ─────────────────────────────────────────────────────────────

let state = { view: 'side', granularity: 'word' };

function runDiff() {
  const a = document.getElementById('text-a').value;
  const b = document.getElementById('text-b').value;

  const linesA = a === '' ? [] : a.split('\n');
  const linesB = b === '' ? [] : b.split('\n');

  const ops = pairOps(lcs(linesA, linesB));

  // Build enriched ops with inline diffs for mod lines
  const enriched = ops.map(op => {
    if (op.t === 'mod') {
      const { oldHtml, newHtml } = inlineDiff(op.a, op.b, state.granularity);
      return { ...op, oldHtml, newHtml };
    }
    return op;
  });

  // Stats
  let cntAdd = 0, cntDel = 0, cntMod = 0, cntEq = 0;
  for (const op of enriched) {
    if (op.t === 'ins') cntAdd++;
    else if (op.t === 'del') cntDel++;
    else if (op.t === 'mod') cntMod++;
    else cntEq++;
  }
  document.getElementById('cnt-add').textContent = cntAdd;
  document.getElementById('cnt-del').textContent = cntDel;
  document.getElementById('cnt-mod').textContent = cntMod;
  document.getElementById('cnt-eq').textContent = cntEq;
  document.getElementById('stats-bar').style.display = '';

  const output = document.getElementById('output');
  if (state.view === 'side') {
    output.innerHTML = renderSideBySide(enriched);
  } else {
    output.innerHTML = renderUnified(enriched);
  }

  // Attach hunk expand handlers
  output.querySelectorAll('.diff-hunk-header').forEach(el => {
    el.addEventListener('click', () => {
      const lines = el.nextElementSibling;
      if (!lines) return;
      if (lines.style.display === 'none') {
        lines.style.display = '';
        el.querySelector('.hunk-label').textContent = '▲ 折りたたむ';
      } else {
        lines.style.display = 'none';
        el.querySelector('.hunk-label').textContent = '▼ 展開する';
      }
    });
  });
}

// ─── Renderers ─────────────────────────────────────────────────────────────

const CONTEXT = 3;   // unchanged lines to show around changes
const COLLAPSE = 6;  // if a run of equal lines exceeds this, collapse

function groupOps(ops) {
  // Assign line numbers and group consecutive unchanged runs
  const groups = [];
  let aNo = 1, bNo = 1;
  for (const op of ops) {
    if (op.t === 'eq') {
      groups.push({ ...op, aNo, bNo });
      aNo++; bNo++;
    } else if (op.t === 'del') {
      groups.push({ ...op, aNo, bNo: null });
      aNo++;
    } else if (op.t === 'ins') {
      groups.push({ ...op, aNo: null, bNo });
      bNo++;
    } else { // mod
      groups.push({ ...op, aNo, bNo });
      aNo++; bNo++;
    }
  }
  return groups;
}

function renderSideBySide(ops) {
  const groups = groupOps(ops);
  let leftHtml = '', rightHtml = '';

  // Determine which equal lines to collapse
  const showLeft = new Array(groups.length).fill(true);
  const showRight = new Array(groups.length).fill(true);
  const collapsed = computeCollapse(groups);

  let i = 0;
  while (i < groups.length) {
    if (collapsed[i]) {
      // Find run length
      let j = i;
      while (j < groups.length && collapsed[j]) j++;
      const count = j - i;
      const hunkHtml = collapseHunkHtml(count);
      leftHtml += hunkHtml;
      rightHtml += hunkHtml;
      i = j;
      continue;
    }
    const op = groups[i];
    if (op.t === 'eq') {
      const c = `<div class="diff-line eq"><span class="line-no">${op.aNo}</span><span class="line-sign"> </span><span class="line-content">${esc(op.a)}</span></div>`;
      leftHtml += c;
      const c2 = `<div class="diff-line eq"><span class="line-no">${op.bNo}</span><span class="line-sign"> </span><span class="line-content">${esc(op.b)}</span></div>`;
      rightHtml += c2;
    } else if (op.t === 'del') {
      leftHtml += `<div class="diff-line del"><span class="line-no">${op.aNo}</span><span class="line-sign">−</span><span class="line-content">${esc(op.a)}</span></div>`;
      rightHtml += `<div class="diff-line" style="min-height:1.6em"><span class="line-no"> </span><span class="line-sign"> </span><span class="line-content"></span></div>`;
    } else if (op.t === 'ins') {
      leftHtml += `<div class="diff-line" style="min-height:1.6em"><span class="line-no"> </span><span class="line-sign"> </span><span class="line-content"></span></div>`;
      rightHtml += `<div class="diff-line add"><span class="line-no">${op.bNo}</span><span class="line-sign">+</span><span class="line-content">${esc(op.b)}</span></div>`;
    } else { // mod
      leftHtml += `<div class="diff-line mod"><span class="line-no">${op.aNo}</span><span class="line-sign">~</span><span class="line-content">${op.oldHtml}</span></div>`;
      rightHtml += `<div class="diff-line mod"><span class="line-no">${op.bNo}</span><span class="line-sign">~</span><span class="line-content">${op.newHtml}</span></div>`;
    }
    i++;
  }

  if (!leftHtml && !rightHtml) {
    leftHtml = rightHtml = '<div class="diff-line eq"><span class="line-no"> </span><span class="line-sign"> </span><span class="line-content" style="color:var(--muted);font-style:italic">差分なし</span></div>';
  }

  return `
    <div class="diff-side-by-side">
      <div class="diff-col">
        <div class="diff-col-header">変更前</div>
        ${leftHtml || '<div style="padding:12px;color:var(--muted)">(空)</div>'}
      </div>
      <div class="diff-col">
        <div class="diff-col-header">変更後</div>
        ${rightHtml || '<div style="padding:12px;color:var(--muted)">(空)</div>'}
      </div>
    </div>`;
}

function renderUnified(ops) {
  const groups = groupOps(ops);
  const collapsed = computeCollapse(groups);
  let html = '<div class="diff-unified">';

  let i = 0;
  while (i < groups.length) {
    if (collapsed[i]) {
      let j = i;
      while (j < groups.length && collapsed[j]) j++;
      const count = j - i;
      html += collapseHunkHtml(count);
      i = j;
      continue;
    }
    const op = groups[i];
    if (op.t === 'eq') {
      html += `<div class="diff-line eq"><span class="line-no">${op.aNo}</span><span class="line-no">${op.bNo}</span><span class="line-sign"> </span><span class="line-content">${esc(op.a)}</span></div>`;
    } else if (op.t === 'del') {
      html += `<div class="diff-line del"><span class="line-no">${op.aNo}</span><span class="line-no"> </span><span class="line-sign">−</span><span class="line-content">${esc(op.a)}</span></div>`;
    } else if (op.t === 'ins') {
      html += `<div class="diff-line add"><span class="line-no"> </span><span class="line-no">${op.bNo}</span><span class="line-sign">+</span><span class="line-content">${esc(op.b)}</span></div>`;
    } else {
      html += `<div class="diff-line mod"><span class="line-no">${op.aNo}</span><span class="line-no"> </span><span class="line-sign">~</span><span class="line-content">${op.oldHtml}</span></div>`;
      html += `<div class="diff-line mod"><span class="line-no"> </span><span class="line-no">${op.bNo}</span><span class="line-sign">~</span><span class="line-content">${op.newHtml}</span></div>`;
    }
    i++;
  }
  html += '</div>';
  if (html === '<div class="diff-unified"></div>') {
    return '<div class="placeholder" style="min-height:120px"><span style="color:var(--muted)">差分なし — 2つのテキストは同一です</span></div>';
  }
  return html;
}

function computeCollapse(groups) {
  const collapsed = new Array(groups.length).fill(false);
  // find runs of eq lines
  let i = 0;
  while (i < groups.length) {
    if (groups[i].t === 'eq') {
      let j = i;
      while (j < groups.length && groups[j].t === 'eq') j++;
      const len = j - i;
      if (len > CONTEXT * 2 + COLLAPSE) {
        // Keep CONTEXT at start and end, collapse middle
        for (let k = i + CONTEXT; k < j - CONTEXT; k++) collapsed[k] = true;
      }
      i = j;
    } else i++;
  }
  return collapsed;
}

function collapseHunkHtml(count) {
  return `<div class="diff-hunk-header">
    <span class="hunk-label">▼ 展開する</span>
    <span>${count} 行の変更なし (クリックで展開)</span>
  </div>
  <div style="display:none">
    <div class="diff-line eq" style="padding:4px 14px;color:var(--muted);font-style:italic;font-size:0.75rem">
      <span>... ${count} 行 ...</span>
    </div>
  </div>`;
  // NOTE: real expand would need actual lines; simplified version shows count only
}

document.addEventListener('keydown', e => {

});

document.getElementById('btn-clear').addEventListener('click', () => {

  document.getElementById('stats-bar').style.display = 'none';
});

document.getElementById('btn-swap').addEventListener('click', () => {
  const a = document.getElementById('text-a');
  const b = document.getElementById('text-b');
  [a.value, b.value] = [b.value, a.value];
  if (document.getElementById('stats-bar').style.display !== 'none') runDiff();
});

// Granularity tabs
document.getElementById('granularity-tabs').addEventListener('click', e => {
  const btn = e.target.closest('[data-g]');
  if (!btn) return;
  document.querySelectorAll('[data-g]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  state.granularity = btn.dataset.g;
  if (document.getElementById('stats-bar').style.display !== 'none') runDiff();
});

// View tabs
document.getElementById('view-tabs').addEventListener('click', e => {
  const btn = e.target.closest('[data-v]');
  if (!btn) return;
  document.querySelectorAll('[data-v]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  state.view = btn.dataset.v;
  if (document.getElementById('stats-bar').style.display !== 'none') runDiff();
});
