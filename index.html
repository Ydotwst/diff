<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TextDiff｜テキスト差分チェッカー</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Text<span>Diff</span></h1>
  <div class="controls">
    <button class="btn" id="btn-swap" title="左右を入れ替え">⇄ 入れ替え</button>
    <button class="btn" id="btn-clear" title="すべてクリア">クリア</button>
    <button class="btn primary" id="btn-diff">比較する</button>
  </div>
</header>

<main>
  <div class="input-area">
    <div>
      <div class="pane-label">変更前 (オリジナル)</div>
      <textarea id="text-a" placeholder="オリジナルのテキストを入力...&#10;&#10;例: Hello, World!
This is a sample text.
It has multiple lines."></textarea>
    </div>
    <div>
      <div class="pane-label">変更後 (修正版)</div>
      <textarea id="text-b" placeholder="比較するテキストを入力...&#10;&#10;例: Hello, World!
This is a great sample text.
It has several lines.
And a new line!"></textarea>
    </div>
  </div>

  <div class="output-area" id="output">
    <div class="placeholder">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v18m0 0h10a2 2 0 0 0 2-2V9M9 21H5a2 2 0 0 1-2-2V9m0 0h18"/>
      </svg>
      <span>テキストを入力して「比較する」を押してください</span>
    </div>
  </div>

  <div class="stats-area" id="stats-area" style="display:none">
    <div class="stats-col">
      <div class="stats-row"><span class="stats-label">文字数:</span><span class="stats-value" id="stat-a-chars"></span></div>
      <div class="stats-row"><span class="stats-label">空白数:</span><span class="stats-value" id="stat-a-spaces"></span></div>
      <div class="stats-row"><span class="stats-label">改行数:</span><span class="stats-value" id="stat-a-newlines"></span></div>
    </div>
    <div class="stats-col">
      <div class="stats-row"><span class="stats-label">文字数:</span><span class="stats-value" id="stat-b-chars"></span></div>
      <div class="stats-row"><span class="stats-label">空白数:</span><span class="stats-value" id="stat-b-spaces"></span></div>
      <div class="stats-row"><span class="stats-label">改行数:</span><span class="stats-value" id="stat-b-newlines"></span></div>
    </div>
  </div>
</main>

<footer>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch diff"></div>差分箇所</div>
  </div>
  <span style="margin-left:auto">TextDiff &mdash; ブラウザのみで動作、サーバー送信なし</span>
</footer>

<script src="diff.js"></script>
</body>
</html>
